<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Serif+JP:wght@700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif;
            background-color: #faf7f2; /* 柔らかいサンドベージュ */
            color: #44403c; /* 暖かいグレー */
        }

        .header-font { font-family: 'Noto Serif JP', serif; }

        /* ナビゲーション */
        .glass { 
            background: rgba(250, 247, 242, 0.9); 
            backdrop-filter: blur(8px); 
            border-bottom: 1px solid #e7e5e4;
        }
        
        /* アーカイブカード */
        .archive-card {
            background: #ffffff;
            border: 1px solid #e7e5e4;
            border-radius: 1.5rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .archive-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(120, 113, 108, 0.2);
            border-color: #a8a29e;
        }

        /* フライヤー画像のコンテナ */
        .flyer-thumb {
            width: 120px;
            height: 120px;
            object-cover: cover;
            border-radius: 1rem;
            background: #f5f5f4;
        }

        /* トラックカード */
        .track-card { 
            background: #ffffff;
            border-bottom: 1px solid #f5f5f4;
            transition: background 0.2s;
        }
        .track-card:hover { background: #fffcf9; }

        /* ボタン */
        .tag-btn { 
            background: #fff;
            color: #78716c;
            border: 1px solid #e7e5e4;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            transition: all 0.2s;
        }
        .tag-btn.active { 
            background: #44403c;
            color: #faf7f2;
            border-color: #44403c;
        }

        /* コメント */
        .comment-box {
            background: #fdfaf6;
            border-left: 2px solid #d6d3d1;
            padding: 4px 10px;
            margin-top: 4px;
            font-size: 0.7rem;
            color: #78716c;
            line-height: 1.5;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="glass sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-tight text-stone-800">DJ ARCHIVE</a>
            <div class="text-[10px] font-mono text-stone-400 uppercase tracking-widest">Selected Library</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12">
        
        <!-- 一覧画面 -->
        <div id="list-view" class="hidden">
            <header class="mb-16 text-center">
                <h1 class="header-font text-3xl md:text-5xl text-stone-800 mb-4">Past Sessions</h1>
                <div id="tag-filter" class="flex flex-wrap gap-2 justify-center mt-8">
                    <button onclick="filterByTag('all')" class="tag-btn active">All</button>
                </div>
            </header>

            <div id="archive-grid" class="space-y-6">
                <!-- ここにリストが入る -->
            </div>
        </div>

        <!-- 詳細画面 -->
        <div id="detail-view" class="hidden">
            <button onclick="showList()" class="mb-8 text-stone-400 hover:text-stone-800 flex items-center transition text-xs font-bold uppercase tracking-widest">
                ← Back
            </button>
            
            <div class="flex flex-col md:flex-row gap-10 mb-16">
                <div id="detail-flyer-container" class="w-full md:w-1/3">
                    <img id="detail-flyer" class="w-full rounded-2xl shadow-xl shadow-stone-200">
                </div>
                <div class="flex-1">
                    <h1 id="event-name" class="header-font text-4xl md:text-5xl text-stone-800 mb-4 leading-tight"></h1>
                    <div class="flex flex-wrap gap-4 text-xs font-bold text-stone-400 mb-6 uppercase tracking-widest">
                        <span id="event-date"></span>
                        <span id="event-venue"></span>
                    </div>
                    <p id="event-description" class="text-stone-600 leading-relaxed italic border-l-2 border-stone-200 pl-6 py-1"></p>
                    <div id="event-tags" class="flex gap-2 mt-6"></div>
                </div>
            </div>

            <div id="track-list" class="bg-white rounded-3xl border border-stone-100 overflow-hidden shadow-sm shadow-stone-100"></div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const archiveId = urlParams.get('id');
        let allArchives = [];

        async function init() {
            if (archiveId) await loadDetail(archiveId);
            else await loadList();
        }

        async function loadList() {
            document.getElementById('list-view').classList.remove('hidden');
            const res = await fetch('data/index.json');
            allArchives = await res.json();
            
            const tags = new Set();
            allArchives.forEach(item => item.tags?.forEach(t => tags.add(t)));
            const tagContainer = document.getElementById('tag-filter');
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = "tag-btn transition";
                btn.textContent = tag;
                btn.onclick = () => filterByTag(tag, btn);
                tagContainer.appendChild(btn);
            });
            renderGrid(allArchives);
        }

        function renderGrid(data) {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('a');
                card.href = `?id=${item.id}`;
                card.className = "archive-card flex items-center p-6 gap-6";
                
                const flyerImg = item.flyer ? `data/${item.flyer}` : 'https://via.placeholder.com/300/f5f5f4/a8a29e?text=NO+IMAGE';
                
                card.innerHTML = `
                    <div class="flex-1">
                        <div class="text-[10px] text-stone-400 font-bold mb-2 uppercase tracking-widest font-mono">${item.date}</div>
                        <h3 class="header-font text-xl md:text-2xl text-stone-800 mb-3">${item.event_name}</h3>
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${(item.tags || []).map(t => `<span class="text-[9px] text-stone-400 font-bold">#${t}</span>`).join('')}
                        </div>
                        <div class="text-[10px] text-stone-400 font-bold uppercase flex items-center">
                            📍 ${item.venue || 'Private Space'}
                        </div>
                    </div>
                    <img src="${flyerImg}" class="flyer-thumb flex-shrink-0 object-cover shadow-sm">
                `;
                grid.appendChild(card);
            });
        }

        function filterByTag(tag, btn) {
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            else document.querySelector('button[onclick*="all"]').classList.add('active');
            renderGrid(tag === 'all' ? allArchives : allArchives.filter(item => item.tags?.includes(tag)));
        }

        async function loadDetail(id) {
            document.getElementById('detail-view').classList.remove('hidden');
            const res = await fetch(`data/archives/${id}.json`);
            const data = await res.json();

            document.getElementById('event-name').textContent = data.event_name;
            document.getElementById('event-date').textContent = data.date;
            document.getElementById('event-venue').textContent = data.venue || 'Private Space';
            document.getElementById('event-description').textContent = data.description;
            
            const flyerImg = data.flyer ? `data/${data.flyer}` : null;
            const flyerEl = document.getElementById('detail-flyer');
            if(flyerImg) {
                flyerEl.src = flyerImg;
            } else {
                document.getElementById('detail-flyer-container').style.display = 'none';
            }

            const list = document.getElementById('track-list');
            data.tracks.forEach((track, index) => {
                const artworkUrl = track.artwork ? `data/${track.artwork}` : 'data/artworks/default.jpg';
                const row = document.createElement('div');
                row.className = "track-card flex items-center p-4";
                row.innerHTML = `
                    <div class="w-8 text-stone-200 font-bold text-xs">${index + 1}</div>
                    <img src="${artworkUrl}" onerror="this.src='data/artworks/default.jpg'" class="w-12 h-12 object-cover rounded-lg mr-4 shadow-sm">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold truncate text-stone-800 text-sm mb-0.5">${track.title}</div>
                        <div class="text-[10px] text-stone-400 truncate font-bold uppercase tracking-wider">${track.artist}</div>
                        ${track.comment ? `<div class="comment-box">💬 ${track.comment}</div>` : ''}
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function showList() { window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
