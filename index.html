<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Archive Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            background-color: #f8fafc; /* 明るい薄いグレー */
            color: #1e293b; /* 濃いグレー（文字用） */
        }

        /* 明るいガラスエフェクト */
        .glass { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(226, 232, 240, 0.8);
        }
        
        /* トラックカード：白ベースに薄い影 */
        .track-card { 
            background: #ffffff;
            border: 1px solid #e2e8f0;
            transition: all 0.25s ease; 
        }
        .track-card:hover { 
            border-color: #06b6d4;
            box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.05);
            background: #fcfdfd;
        }

        /* 履歴カード：グリッド用 */
        .archive-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            transition: all 0.3s ease;
        }
        .archive-card:hover {
            transform: translateY(-4px);
            border-color: #06b6d4;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* タグボタン：明るい背景 */
        .tag-btn { 
            background: #ffffff;
            color: #64748b;
            border: 1px solid #e2e8f0;
            transition: all 0.2s; 
        }
        .tag-btn:hover { border-color: #06b6d4; color: #06b6d4; }
        .tag-btn.active { 
            background-color: #06b6d4; 
            color: white; 
            border-color: #06b6d4; 
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        /* コメントボックス：薄いブルーの背景 */
        .comment-box {
            background: #f0f9ff;
            border-left: 3px solid #06b6d4;
            padding: 6px 12px;
            margin-top: 8px;
            font-size: 0.75rem;
            color: #475569;
            line-height: 1.5;
            border-radius: 2px 8px 8px 2px;
        }
    </style>
</head>
<body class="min-h-screen">

    <!-- ナビゲーションバー -->
    <nav class="glass sticky top-0 z-50 p-4">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-extrabold tracking-tighter text-gray-900">
                DJ <span class="text-cyan-500">ARCHIVE</span>
            </a>
            <div id="status-tag" class="text-[9px] font-bold text-gray-400 uppercase tracking-widest border border-gray-200 px-3 py-1 rounded-full bg-white">
                Online Database
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        
        <!-- 一覧表示エリア -->
        <div id="list-view" class="hidden">
            <section class="mb-16 text-center">
                <h1 class="text-4xl font-black text-gray-900 mb-4 tracking-tight">Setlist Collections</h1>
                <p class="text-gray-500 text-sm">過去のプレイ履歴と解説をまとめたアーカイブサイト</p>
            </section>

            <section class="mb-12">
                <div id="tag-filter" class="flex flex-wrap gap-2 justify-center">
                    <button onclick="filterByTag('all')" class="tag-btn px-6 py-2 rounded-full text-xs font-bold active transition">All Archives</button>
                </div>
            </section>

            <section>
                <div id="archive-grid" class="grid gap-8 md:grid-cols-2">
                    <!-- 履歴カードがここに挿入される -->
                </div>
            </section>
        </div>

        <!-- 詳細表示エリア -->
        <div id="detail-view" class="hidden">
            <button onclick="showList()" class="mb-8 text-gray-400 hover:text-cyan-500 flex items-center transition text-xs font-bold uppercase tracking-widest">
                <span class="mr-2">←</span> Back to Collections
            </button>
            
            <header id="detail-header" class="mb-16">
                <h1 id="event-name" class="text-4xl md:text-6xl font-black text-gray-900 mb-6 leading-tight tracking-tight"></h1>
                <div class="flex flex-wrap gap-6 text-sm font-bold text-cyan-600 mb-8 uppercase tracking-wider">
                    <span id="event-date" class="bg-cyan-50 px-3 py-1 rounded"></span>
                    <span id="event-venue" class="bg-gray-100 text-gray-600 px-3 py-1 rounded"></span>
                </div>
                <div class="max-w-3xl">
                    <p id="event-description" class="text-gray-600 leading-relaxed text-lg border-l-4 border-cyan-500 pl-6 py-1"></p>
                </div>
                <div id="event-tags" class="flex gap-2 mt-8"></div>
            </header>

            <div id="track-list" class="space-y-4">
                <!-- トラックリストがここに挿入される -->
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const archiveId = urlParams.get('id');
        let allArchives = [];

        async function init() {
            if (archiveId) await loadDetail(archiveId);
            else await loadList();
        }

        async function loadList() {
            document.getElementById('list-view').classList.remove('hidden');
            const res = await fetch('data/index.json');
            allArchives = await res.json();
            
            const tags = new Set();
            allArchives.forEach(item => item.tags?.forEach(t => tags.add(t)));
            
            const tagContainer = document.getElementById('tag-filter');
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = "tag-btn px-6 py-2 rounded-full text-xs font-bold transition";
                btn.textContent = tag;
                btn.onclick = () => filterByTag(tag, btn);
                tagContainer.appendChild(btn);
            });
            renderGrid(allArchives);
        }

        function renderGrid(data) {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('a');
                card.href = `?id=${item.id}`;
                card.className = "archive-card group block p-10 rounded-3xl shadow-sm transition-all duration-300";
                card.innerHTML = `
                    <div class="text-xs text-cyan-500 font-bold mb-4 uppercase tracking-widest">${item.date}</div>
                    <h3 class="text-2xl font-black text-gray-900 group-hover:text-cyan-600 transition mb-4 leading-snug">${item.event_name}</h3>
                    <div class="flex flex-wrap gap-2 mb-6">
                        ${(item.tags || []).map(t => `<span class="text-[10px] bg-gray-50 px-2 py-1 rounded text-gray-400 font-bold border border-gray-100">#${t}</span>`).join('')}
                    </div>
                    <div class="text-[11px] text-gray-400 font-bold uppercase tracking-widest flex items-center">
                        <span class="mr-2">📍</span> ${item.venue || 'Private Set'}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterByTag(tag, btn) {
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            else document.querySelector('button[onclick*="all"]').classList.add('active');
            renderGrid(tag === 'all' ? allArchives : allArchives.filter(item => item.tags?.includes(tag)));
        }

        async function loadDetail(id) {
            document.getElementById('detail-view').classList.remove('hidden');
            const res = await fetch(`data/archives/${id}.json`);
            const data = await res.json();

            document.title = `${data.event_name} - Archive`;
            document.getElementById('event-name').textContent = data.event_name;
            document.getElementById('event-date').textContent = data.date;
            document.getElementById('event-venue').textContent = data.venue || 'Private Space';
            document.getElementById('event-description').textContent = data.description || 'No description provided.';
            
            const list = document.getElementById('track-list');
            data.tracks.forEach((track, index) => {
                const artworkUrl = track.artwork ? `data/${track.artwork}` : 'data/artworks/default.jpg';
                const row = document.createElement('div');
                row.className = "track-card flex items-center p-5 rounded-2xl";
                row.innerHTML = `
                    <div class="w-8 text-gray-300 font-bold text-xs">${index + 1}</div>
                    <img src="${artworkUrl}" onerror="this.src='data/artworks/default.jpg'" class="w-16 h-16 object-cover rounded-xl mr-6 shadow-sm flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold truncate text-gray-900 text-base mb-1 tracking-tight">${track.title}</div>
                        <div class="text-[11px] text-cyan-600 truncate font-extrabold uppercase tracking-widest mb-1">${track.artist}</div>
                        ${track.comment ? `<div class="comment-box italic">💬 ${track.comment}</div>` : ''}
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function showList() { window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
