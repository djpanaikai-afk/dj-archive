<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Archive Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains+Mono', monospace; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); }
        
        /* 横移動を排除したトラックカードのスタイル */
        .track-card { 
            transition: all 0.2s ease-in-out; 
            border: 1px solid transparent; 
        }
        .track-card:hover { 
            background: rgba(31, 41, 55, 0.8); 
            border-color: rgba(6, 182, 212, 0.3);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        /* タグボタンのスタイル */
        .tag-btn { transition: all 0.2s; }
        .tag-btn.active { 
            background-color: #06b6d4; 
            color: white; 
            border-color: #06b6d4; 
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.4);
        }

        /* コメントボックスの装飾 */
        .comment-box {
            background: rgba(0, 0, 0, 0.2);
            border-left: 2px solid #06b6d4;
            padding: 4px 10px;
            margin-top: 6px;
            font-size: 0.7rem;
            color: #9ca3af;
            line-height: 1.4;
            border-radius: 0 4px 4px 0;
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

    <!-- ナビゲーションバー -->
    <nav class="border-b border-gray-900 p-5 glass sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500">
                DJ ARCHIVE
            </a>
            <div id="status-tag" class="text-[10px] font-mono text-gray-500 uppercase tracking-widest border border-gray-800 px-2 py-1 rounded">
                System Active
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        
        <!-- 一覧表示エリア -->
        <div id="list-view" class="hidden">
            <section class="mb-12">
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-[0.3em] mb-6 flex items-center">
                    <span class="w-8 h-[1px] bg-gray-800 mr-4"></span> Filter by Tags
                </h2>
                <div id="tag-filter" class="flex flex-wrap gap-2">
                    <button onclick="filterByTag('all')" class="tag-btn px-5 py-1.5 rounded-full border border-gray-800 text-xs hover:border-cyan-500 active transition">All Sets</button>
                </div>
            </section>

            <section>
                <h2 class="text-xs font-bold text-gray-500 uppercase tracking-[0.3em] mb-8 flex items-center">
                    <span class="w-8 h-[1px] bg-gray-800 mr-4"></span> Archive Timeline
                </h2>
                <div id="archive-grid" class="grid gap-6 md:grid-cols-2">
                    <!-- 履歴カードがここに挿入される -->
                </div>
            </section>
        </div>

        <!-- 詳細表示エリア -->
        <div id="detail-view" class="hidden">
            <button onclick="showList()" class="mb-10 text-gray-500 hover:text-cyan-400 flex items-center transition text-xs font-bold uppercase tracking-widest">
                <span class="mr-2">←</span> Back to Timeline
            </button>
            
            <header id="detail-header" class="mb-12">
                <h1 id="event-name" class="text-5xl md:text-7xl font-black mb-6 leading-tight tracking-tighter"></h1>
                <div class="flex flex-wrap gap-8 text-xs font-mono text-cyan-500 mb-8 uppercase tracking-widest">
                    <span id="event-date"></span>
                    <span id="event-venue"></span>
                </div>
                <div class="max-w-2xl">
                    <p id="event-description" class="text-gray-400 leading-relaxed italic border-l-2 border-gray-800 pl-6 py-2"></p>
                </div>
                <div id="event-tags" class="flex gap-2 mt-8"></div>
            </header>

            <div id="track-list" class="space-y-3">
                <!-- トラックリストがここに挿入される -->
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const archiveId = urlParams.get('id');
        let allArchives = [];

        async function init() {
            try {
                if (archiveId) {
                    await loadDetail(archiveId);
                } else {
                    await loadList();
                }
            } catch (err) {
                console.error("Initialization failed:", err);
            }
        }

        // 一覧画面のロード
        async function loadList() {
            document.getElementById('list-view').classList.remove('hidden');
            const res = await fetch('data/index.json');
            allArchives = await res.json();
            
            // ユニークなタグを抽出してフィルターボタンを作成
            const tags = new Set();
            allArchives.forEach(item => item.tags?.forEach(t => tags.add(t)));
            
            const tagContainer = document.getElementById('tag-filter');
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = "tag-btn px-5 py-1.5 rounded-full border border-gray-800 text-xs hover:border-cyan-500 transition";
                btn.textContent = tag;
                btn.onclick = () => filterByTag(tag, btn);
                tagContainer.appendChild(btn);
            });

            renderGrid(allArchives);
        }

        // 履歴グリッドの描画
        function renderGrid(data) {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';
            
            data.forEach(item => {
                const card = document.createElement('a');
                card.href = `?id=${item.id}`;
                card.className = "group block p-8 bg-gray-900/40 rounded-3xl border border-gray-900 hover:border-cyan-500/50 transition-all duration-300 shadow-2xl";
                card.innerHTML = `
                    <div class="text-[10px] text-cyan-500 font-mono font-bold mb-4 uppercase tracking-[0.2em]">${item.date}</div>
                    <h3 class="text-2xl font-black group-hover:text-cyan-400 transition mb-4 leading-snug">${item.event_name}</h3>
                    <div class="flex flex-wrap gap-1.5 mb-6">
                        ${(item.tags || []).map(t => `<span class="text-[9px] bg-black/40 px-2 py-0.5 rounded text-gray-500 border border-gray-800 font-mono">#${t}</span>`).join('')}
                    </div>
                    <div class="text-[11px] text-gray-600 font-mono uppercase tracking-widest">${item.venue || 'Private Space'}</div>
                `;
                grid.appendChild(card);
            });
        }

        // タグによる絞り込み
        function filterByTag(tag, btn) {
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            else document.querySelector('button[onclick*="all"]').classList.add('active');

            if (tag === 'all') {
                renderGrid(allArchives);
            } else {
                renderGrid(allArchives.filter(item => item.tags?.includes(tag)));
            }
        }

        // 詳細画面のロード
        async function loadDetail(id) {
            document.getElementById('detail-view').classList.remove('hidden');
            const res = await fetch(`data/archives/${id}.json`);
            const data = await res.json();

            document.title = `${data.event_name} - DJ Archive`;
            document.getElementById('event-name').textContent = data.event_name;
            document.getElementById('event-date').textContent = `Date. ${data.date.replace(/-/g, '.')}`;
            document.getElementById('event-venue').textContent = `Loc. ${data.venue || 'Private'}`;
            document.getElementById('event-description').textContent = data.description || 'No description provided for this set.';
            
            const tagsContainer = document.getElementById('event-tags');
            data.tags?.forEach(tag => {
                const span = document.createElement('span');
                span.className = "px-3 py-1 bg-gray-900 border border-gray-800 text-[10px] rounded text-gray-500 font-mono";
                span.textContent = `#${tag}`;
                tagsContainer.appendChild(span);
            });

            const list = document.getElementById('track-list');
            data.tracks.forEach((track, index) => {
                const artworkUrl = track.artwork ? `data/${track.artwork}` : 'data/artworks/default.jpg';
                const row = document.createElement('div');
                row.className = "flex items-center p-4 glass rounded-2xl track-card";
                row.innerHTML = `
                    <div class="w-10 text-gray-800 font-mono text-[11px] font-bold">${String(index + 1).padStart(2, '0')}</div>
                    <img src="${artworkUrl}" onerror="this.src='data/artworks/default.jpg'" class="w-16 h-16 object-cover rounded-xl mr-5 shadow-2xl flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold truncate text-gray-100 text-base mb-0.5 tracking-tight">${track.title}</div>
                        <div class="text-[11px] text-cyan-500 truncate font-bold uppercase tracking-[0.1em] mb-1">${track.artist}</div>
                        ${track.comment ? `<div class="comment-box italic font-mono">💬 ${track.comment}</div>` : ''}
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function showList() {
            window.location.href = 'index.html';
        }

        init();
    </script>
</body>
</html>
