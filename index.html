<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ ARCHIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --groovy-orange: #e45f2b;
            --groovy-black: #26211d;
            --groovy-yellow: #f7cb4d;
            --groovy-green: #90ee4c;
            --groovy-blue: #92c0f2;
            --groovy-cream: #fff9f0;
        }

        body { 
            font-family: 'Lexend', sans-serif;
            background-color: var(--groovy-orange);
            color: var(--groovy-black);
            margin: 0;
            padding: 0;
            word-wrap: break-word;
        }

        h1, h2, h3, .font-groovy { 
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
        }

        .neo-box {
            background: var(--groovy-cream);
            border: 4px solid var(--groovy-black);
            box-shadow: 6px 6px 0px 0px var(--groovy-black);
            transition: all 0.2s ease;
        }
        @media (min-width: 768px) {
            .neo-box { box-shadow: 8px 8px 0px 0px var(--groovy-black); }
        }

        nav {
            background: var(--groovy-cream);
            border-bottom: 4px solid var(--groovy-black);
        }

        .tag-btn {
            background: var(--groovy-cream);
            border: 2px solid var(--groovy-black);
            font-weight: 800;
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            box-shadow: 3px 3px 0px 0px var(--groovy-black);
            transition: all 0.1s;
        }
        @media (min-width: 768px) {
            .tag-btn { font-size: 0.875rem; padding: 0.5rem 1rem; box-shadow: 4px 4px 0px 0px var(--groovy-black); }
        }
        .tag-btn.active {
            background: var(--groovy-yellow);
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px var(--groovy-black);
        }

        .track-card {
            border-bottom: 2px solid var(--groovy-black);
            transition: background 0.2s;
        }
        .track-card:last-child { border-bottom: none; }
        .track-card:hover { background: var(--groovy-yellow); }

        .comment-box {
            background: var(--groovy-blue);
            border: 2px solid var(--groovy-black);
            padding: 4px 8px;
            margin-top: 6px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-block;
            width: fit-content;
        }

        .flyer-img {
            border: 3px solid var(--groovy-black);
            object-fit: cover;
        }
        @media (min-width: 768px) {
            .flyer-img { border: 4px solid var(--groovy-black); }
        }

        /* 詳細ページのフライヤー高さ調整 */
        #detail-flyer {
            width: 100%;
            height: auto;
            max-height: 400px; /* スマホ用 */
            object-fit: cover;
        }
        @media (min-width: 768px) {
            #detail-flyer {
                max-height: 300px; /* PC用：高さを300pxに制限 */
                width: auto;       /* 横幅は自動調整（縦横比維持） */
                max-width: 100%;   /* 親要素からはみ出さない */
                object-fit: contain; /* 全体を表示 */
                background: var(--groovy-black); /* 縦長で余白が出る場合は黒で埋める */
                display: block;
                margin-left: 0;
            }
        }

        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: var(--groovy-orange); }
        ::-webkit-scrollbar-thumb { 
            background: var(--groovy-black); 
            border: 3px solid var(--groovy-orange);
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 p-4 mb-6 md:mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl md:text-3xl font-groovy tracking-tighter text-black no-underline">DJ ARCHIVE</a>
            <div class="bg-black text-white px-2 py-0.5 md:px-3 md:py-1 text-[8px] md:text-[10px] font-bold uppercase tracking-widest">Library</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 md:px-6 pb-24">
        
        <!-- 一覧表示 -->
        <div id="list-view" class="hidden">
            <div class="mb-8 md:mb-12 flex flex-wrap gap-2 md:gap-4 justify-center" id="tag-filter">
                <button onclick="filterByTag('all')" class="tag-btn active">ALL SETS</button>
            </div>
            <div id="archive-grid" class="grid gap-6 md:gap-10 grid-cols-1 md:grid-cols-2"></div>
        </div>

        <!-- 詳細表示 -->
        <div id="detail-view" class="hidden">
            <button onclick="showList()" class="mb-6 md:mb-8 font-groovy text-lg md:text-xl hover:underline italic">← BACK TO LIST</button>
            
            <div class="flex flex-col md:flex-row gap-8 md:gap-12 mb-12 md:mb-16 items-start">
                <div id="detail-flyer-container" class="w-full md:w-2/5" style="display:none;">
                    <img id="detail-flyer" onerror="this.parentElement.style.display='none'" class="neo-box rounded-none flyer-img">
                </div>
                <div class="flex-1">
                    <h1 id="event-name" class="font-groovy text-3xl md:text-7xl leading-tight mb-4 md:mb-6"></h1>
                    <div class="flex flex-wrap gap-3 mb-6">
                        <span id="event-date" class="bg-white border-2 border-black px-3 py-1 text-xs md:text-base font-bold shadow-[3px_3px_0_0_#000] md:shadow-[4px_4px_0_0_#000]"></span>
                        <span id="event-venue" class="bg-white border-2 border-black px-3 py-1 text-xs md:text-base font-bold shadow-[3px_3px_0_0_#000] md:shadow-[4px_4px_0_0_#000]"></span>
                    </div>
                    <p id="event-description" class="hidden text-sm md:text-xl font-medium leading-relaxed p-4 md:p-6 bg-[#90ee4c] border-4 border-black shadow-[6px_6px_0_0_#000] md:shadow-[8px_8px_0_0_#000]"></p>
                    <div id="event-tags" class="flex flex-wrap gap-2 mt-6"></div>
                </div>
            </div>

            <div id="track-list" class="neo-box overflow-hidden"></div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const archiveId = urlParams.get('id');
        let allArchives = [];

        async function init() {
            if (archiveId) await loadDetail(archiveId);
            else await loadList();
        }

        async function loadList() {
            document.getElementById('list-view').classList.remove('hidden');
            const res = await fetch('data/index.json');
            allArchives = await res.json();
            
            const tags = new Set();
            allArchives.forEach(item => item.tags?.forEach(t => tags.add(t)));
            const tagContainer = document.getElementById('tag-filter');
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = "tag-btn";
                btn.textContent = tag.toUpperCase();
                btn.onclick = () => filterByTag(tag, btn);
                tagContainer.appendChild(btn);
            });
            renderGrid(allArchives);
        }

        function renderGrid(data) {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';
            data.forEach((item, idx) => {
                const card = document.createElement('a');
                card.href = `?id=${item.id}`;
                card.className = "neo-box p-4 md:p-6 flex flex-col gap-4 no-underline text-black";
                
                const colors = ['var(--groovy-yellow)', 'var(--groovy-green)', 'var(--groovy-blue)'];
                const bgColor = colors[idx % colors.length];
                
                const flyerHtml = item.flyer 
                    ? `<img src="data/${item.flyer}" onerror="this.style.display='none'" class="w-full h-48 md:h-64 flyer-img" style="background:${bgColor}">`
                    : '';
                
                card.innerHTML = `
                    ${flyerHtml}
                    <div class="flex-1">
                        <div class="text-[8px] md:text-[10px] font-bold mb-1 md:mb-2 uppercase tracking-tighter bg-black text-white inline-block px-2">${item.date}</div>
                        <h3 class="font-groovy text-xl md:text-3xl leading-tight mb-2 md:mb-3">${item.event_name}</h3>
                        <div class="flex flex-wrap gap-1 mb-2">
                            ${(item.tags || []).map(t => `<span class="font-bold text-[8px] md:text-[10px] bg-white border border-black px-1">#${t}</span>`).join('')}
                        </div>
                        <div class="font-bold text-[10px] md:text-sm italic uppercase tracking-widest text-gray-600">@ ${item.venue || 'Space'}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterByTag(tag, btn) {
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            else document.querySelector('button[onclick*="all"]').classList.add('active');
            renderGrid(tag === 'all' ? allArchives : allArchives.filter(item => item.tags?.includes(tag)));
        }

        async function loadDetail(id) {
            document.getElementById('detail-view').classList.remove('hidden');
            const res = await fetch(`data/archives/${id}.json`);
            const data = await res.json();

            document.getElementById('event-name').textContent = data.event_name;
            document.getElementById('event-date').textContent = data.date;
            document.getElementById('event-venue').textContent = data.venue || 'UNKNOWN';
            
            const descEl = document.getElementById('event-description');
            if (data.description && data.description.trim() !== "") {
                descEl.textContent = data.description;
                descEl.classList.remove('hidden');
            } else {
                descEl.classList.add('hidden');
            }
            
            const flyerImg = data.flyer ? `data/${data.flyer}` : null;
            const flyerContainer = document.getElementById('detail-flyer-container');
            if(flyerImg) {
                const img = document.getElementById('detail-flyer');
                img.src = flyerImg;
                flyerContainer.style.display = 'block';
            } else {
                flyerContainer.style.display = 'none';
            }

            const list = document.getElementById('track-list');
            list.innerHTML = '';
            data.tracks.forEach((track, index) => {
                const artworkUrl = track.artwork ? `data/${track.artwork}` : 'data/artworks/default.jpg';
                const row = document.createElement('div');
                row.className = "track-card flex items-center p-4 md:p-6";
                row.innerHTML = `
                    <div class="w-10 md:w-20 font-groovy text-xl md:text-4xl flex-shrink-0 whitespace-nowrap mr-2">
                        ${index + 1}
                    </div>
                    <img src="${artworkUrl}" onerror="this.src='data/artworks/default.jpg'" class="w-12 h-12 md:w-16 md:h-16 border-2 border-black mr-4 md:mr-6 flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-sm md:text-xl leading-tight break-words mb-0.5 md:mb-1">${track.title}</div>
                        <div class="text-[10px] md:text-sm font-bold uppercase italic text-gray-700">${track.artist}</div>
                        ${track.comment ? `<div class="comment-box leading-normal uppercase">💬 ${track.comment}</div>` : ''}
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function showList() { window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
