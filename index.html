<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DJ Archive - LET IT GO Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Lexend:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --groovy-orange: #e45f2b;
            --groovy-black: #26211d;
            --groovy-yellow: #f7cb4d;
            --groovy-green: #90ee4c;
            --groovy-blue: #92c0f2;
            --groovy-cream: #fff9f0;
        }

        body { 
            font-family: 'Lexend', sans-serif;
            background-color: var(--groovy-orange);
            color: var(--groovy-black);
            margin: 0;
            padding: 0;
        }

        h1, h2, h3, .font-groovy { 
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
        }

        /* ネオ・ブルータリズム：太い境界線と影 */
        .neo-box {
            background: var(--groovy-cream);
            border: 4px solid var(--groovy-black);
            box-shadow: 8px 8px 0px 0px var(--groovy-black);
            transition: all 0.2s ease;
        }
        .neo-box:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0px 0px var(--groovy-black);
        }

        /* ナビゲーション */
        nav {
            background: var(--groovy-cream);
            border-bottom: 4px solid var(--groovy-black);
        }

        /* タグボタン */
        .tag-btn {
            background: var(--groovy-cream);
            border: 2px solid var(--groovy-black);
            font-weight: 800;
            padding: 0.5rem 1rem;
            box-shadow: 4px 4px 0px 0px var(--groovy-black);
            transition: all 0.1s;
        }
        .tag-btn.active {
            background: var(--groovy-yellow);
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px var(--groovy-black);
        }

        /* トラックカード */
        .track-card {
            border-bottom: 2px solid var(--groovy-black);
            transition: background 0.2s;
        }
        .track-card:last-child { border-bottom: none; }
        .track-card:hover { background: var(--groovy-yellow); }

        /* コメント */
        .comment-box {
            background: var(--groovy-blue);
            border: 2px solid var(--groovy-black);
            padding: 4px 8px;
            margin-top: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            display: inline-block;
        }

        /* フライヤーサムネイル */
        .flyer-img {
            border: 4px solid var(--groovy-black);
            object-fit: cover;
        }

        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: var(--groovy-orange); }
        ::-webkit-scrollbar-thumb { 
            background: var(--groovy-black); 
            border: 3px solid var(--groovy-orange);
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="sticky top-0 z-50 p-4 mb-8">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-3xl font-groovy tracking-tighter">LET IT GO ARCHIVE</a>
            <div class="bg-black text-white px-3 py-1 text-[10px] font-bold uppercase tracking-widest">Live On Air</div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 pb-24">
        
        <!-- リスト表示 -->
        <div id="list-view" class="hidden">
            <div class="mb-12 flex flex-wrap gap-4 justify-center" id="tag-filter">
                <button onclick="filterByTag('all')" class="tag-btn active">ALL SETS</button>
            </div>

            <div id="archive-grid" class="grid gap-8">
                <!-- ここにリストが入る -->
            </div>
        </div>

        <!-- 詳細表示 -->
        <div id="detail-view" class="hidden">
            <button onclick="showList()" class="mb-8 font-groovy text-xl hover:underline italic">← BACK TO LIST</button>
            
            <div class="flex flex-col md:flex-row gap-12 mb-16 items-start">
                <div id="detail-flyer-container" class="w-full md:w-2/5">
                    <img id="detail-flyer" class="w-full neo-box rounded-none flyer-img">
                </div>
                <div class="flex-1">
                    <h1 id="event-name" class="font-groovy text-5xl md:text-7xl leading-none mb-6"></h1>
                    <div class="flex flex-wrap gap-4 mb-8">
                        <span id="event-date" class="bg-white border-2 border-black px-4 py-1 font-bold shadow-[4px_4px_0_0_#000]"></span>
                        <span id="event-venue" class="bg-white border-2 border-black px-4 py-1 font-bold shadow-[4px_4px_0_0_#000]"></span>
                    </div>
                    <p id="event-description" class="text-xl font-medium leading-relaxed p-6 bg-[#90ee4c] border-4 border-black shadow-[8px_8px_0_0_#000]"></p>
                    <div id="event-tags" class="flex gap-2 mt-8"></div>
                </div>
            </div>

            <div id="track-list" class="neo-box overflow-hidden">
                <!-- 曲リスト -->
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const archiveId = urlParams.get('id');
        let allArchives = [];

        async function init() {
            if (archiveId) await loadDetail(archiveId);
            else await loadList();
        }

        async function loadList() {
            document.getElementById('list-view').classList.remove('hidden');
            const res = await fetch('data/index.json');
            allArchives = await res.json();
            
            const tags = new Set();
            allArchives.forEach(item => item.tags?.forEach(t => tags.add(t)));
            const tagContainer = document.getElementById('tag-filter');
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = "tag-btn";
                btn.textContent = tag.toUpperCase();
                btn.onclick = () => filterByTag(tag, btn);
                tagContainer.appendChild(btn);
            });
            renderGrid(allArchives);
        }

        function renderGrid(data) {
            const grid = document.getElementById('archive-grid');
            grid.innerHTML = '';
            data.forEach((item, idx) => {
                const card = document.createElement('a');
                card.href = `?id=${item.id}`;
                card.className = "neo-box p-8 flex flex-col md:flex-row gap-8 items-center";
                
                const flyerImg = item.flyer ? `data/${item.flyer}` : 'https://via.placeholder.com/400?text=NO+IMAGE';
                const colors = ['var(--groovy-yellow)', 'var(--groovy-green)', 'var(--groovy-blue)'];
                const bgColor = colors[idx % colors.length];
                
                card.innerHTML = `
                    <div class="flex-1 order-2 md:order-1">
                        <div class="text-sm font-bold mb-2 uppercase tracking-tighter bg-black text-white inline-block px-2">${item.date}</div>
                        <h3 class="font-groovy text-4xl md:text-5xl leading-tight mb-4">${item.event_name}</h3>
                        <div class="flex flex-wrap gap-2 mb-4">
                            ${(item.tags || []).map(t => `<span class="font-bold text-sm bg-white border border-black px-1">#${t}</span>`).join('')}
                        </div>
                        <div class="font-bold text-lg italic uppercase">@ ${item.venue || 'Space'}</div>
                    </div>
                    <img src="${flyerImg}" class="w-48 h-48 md:w-64 md:h-64 flyer-img order-1 md:order-2" style="background:${bgColor}">
                `;
                grid.appendChild(card);
            });
        }

        function filterByTag(tag, btn) {
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            else document.querySelector('button[onclick*="all"]').classList.add('active');
            renderGrid(tag === 'all' ? allArchives : allArchives.filter(item => item.tags?.includes(tag)));
        }

        async function loadDetail(id) {
            document.getElementById('detail-view').classList.remove('hidden');
            const res = await fetch(`data/archives/${id}.json`);
            const data = await res.json();

            document.getElementById('event-name').textContent = data.event_name;
            document.getElementById('event-date').textContent = data.date;
            document.getElementById('event-venue').textContent = data.venue || 'UNKNOWN';
            document.getElementById('event-description').textContent = data.description || 'LET IT GO...';
            
            const flyerImg = data.flyer ? `data/${data.flyer}` : null;
            if(flyerImg) document.getElementById('detail-flyer').src = flyerImg;
            else document.getElementById('detail-flyer-container').style.display = 'none';

            const list = document.getElementById('track-list');
            data.tracks.forEach((track, index) => {
                const artworkUrl = track.artwork ? `data/${track.artwork}` : 'data/artworks/default.jpg';
                const row = document.createElement('div');
                row.className = "track-card flex items-center p-6";
                row.innerHTML = `
                    <div class="w-12 font-groovy text-2xl">${index + 1}</div>
                    <img src="${artworkUrl}" onerror="this.src='data/artworks/default.jpg'" class="w-16 h-16 border-2 border-black mr-6 flex-shrink-0">
                    <div class="flex-1 min-w-0">
                        <div class="font-bold text-xl truncate">${track.title}</div>
                        <div class="text-sm font-bold uppercase italic">${track.artist}</div>
                        ${track.comment ? `<div class="comment-box uppercase">💬 ${track.comment}</div>` : ''}
                    </div>
                `;
                list.appendChild(row);
            });
        }

        function showList() { window.location.href = 'index.html'; }
        init();
    </script>
</body>
</html>
